<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxis — Confirming...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div class="auth-container">
        <a href="../index.html" class="auth-logo">noxis.ai</a>
        <div class="auth-card" style="text-align: center; gap: 16px;">
            <div style="font-size: 48px;">✓</div>
            <h1>Email confirmed!</h1>
            <p class="auth-sub">Your account is ready. Taking you to the dashboard...</p>
            <p class="auth-error" id="errorMsg"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script>
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        client.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' || session) {
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
            } else {
                document.getElementById('errorMsg').textContent = 'Something went wrong. Please try logging in.';
            }
        });
    </script>
</body>
</html>
