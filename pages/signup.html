<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxis — Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>

    <script>
        const MAINTENANCE_MODE = false;
        const ADMIN_BYPASS = 'AdminNoxis.';
        if (MAINTENANCE_MODE) {
            if (localStorage.getItem('noxis_admin_bypass') !== ADMIN_BYPASS) {
                window.location.href = '/maintenance.html';
            }
        }
    </script>

    <div class="bg-blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div class="auth-container">
        <a href="../index.html" class="auth-logo">noxis ai</a>
        <div class="auth-card">
            <a href="/index.html" class="back-btn">
                <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
                Home
            </a>
            <h1>Create your account</h1>
            <p class="auth-sub">Start your journey to consistent trading.</p>

            <div class="auth-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@example.com" />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Your password" />
                        <button type="button" class="eye-toggle" id="eyeToggle">
                            <i data-lucide="eye" style="width:16px;height:16px;"></i>
                        </button>
                    </div>
                    <div class="password-requirements">
                        <span class="req" id="reqLength">8+ chars</span>
                        <span class="req" id="reqNumber">numbers</span>
                        <span class="req" id="reqSpecial">special char</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" />
                    <button type="button" class="eye-toggle" id="eyeToggle2">
                        <i data-lucide="eye" style="width:16px;height:16px;"></i>
                    </button>
                    </div>
                </div>
                <div class="remember-me">
                    <input type="checkbox" id="remember" />
                    <label for="remember">Remember me</label>
                </div>
                <button class="auth-btn" id="signupBtn">Create account</button>
                <p style="font-size:11px;color:#444;text-align:center;">
                    By signing up you agree to our
                    <a href="/privacy-policy.html" style="color:#888;">Privacy Policy</a> and
                    <a href="/terms-of-service.html" style="color:#888;">Terms of Service</a>
                </p>
                <p class="auth-error" id="errorMsg"></p>
            </div>

            <p class="auth-switch" style="margin-top:24px;">Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
