<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noxis AI — Reset Password</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>

  <div class="login-page">
    <div class="login-glow-left"></div>
    <div class="login-glow-right"></div>

    <a href="../index.html" class="login-logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 1L23 12L12 23L1 12Z" stroke="#00d4d4" stroke-width="1.5" fill="none"/><path d="M12 5L19 12L12 19L5 12Z" stroke="#00d4d4" stroke-width="1.5" fill="none"/></svg>
      <span>noxis ai</span>
    </a>

    <div class="login-card">
      <div class="login-card-glow"></div>
      <h1 class="login-title">Set new password</h1>
      <p class="login-sub">Enter your new password below.</p>

      <p class="error-msg" id="errorMsg"></p>

      <div class="login-form">
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" class="eye-toggle" id="eyeToggle"></button>
          </div>
          <div class="password-reqs">
            <span id="reqLength">✕ 8+ chars</span>
            <span id="reqNumber">✕ numbers</span>
            <span id="reqSpecial">✕ special char</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="••••••••" required>
            <button type="button" class="eye-toggle" id="eyeToggle2"></button>
          </div>
        </div>

        <button type="button" class="login-btn" id="updateBtn">Update Password →</button>
      </div>

      <p class="login-footer"><a href="login.html">← Back to login</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script>
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
    const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

    document.getElementById('eyeToggle').innerHTML = eyeIcon;
    document.getElementById('eyeToggle2').innerHTML = eyeIcon;

    document.getElementById('eyeToggle').addEventListener('click', () => {
      const input = document.getElementById('password');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      document.getElementById('eyeToggle').innerHTML = isPassword ? eyeOffIcon : eyeIcon;
    });

    document.getElementById('eyeToggle2').addEventListener('click', () => {
      const input = document.getElementById('confirmPassword');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      document.getElementById('eyeToggle2').innerHTML = isPassword ? eyeOffIcon : eyeIcon;
    });

    document.getElementById('password').addEventListener('input', () => {
      const val = document.getElementById('password').value;
      const reqLength = document.getElementById('reqLength');
      const reqNumber = document.getElementById('reqNumber');
      const reqSpecial = document.getElementById('reqSpecial');

      if (val.length >= 8) {
        reqLength.textContent = '✓ 8+ chars';
        reqLength.classList.add('met');
      } else {
        reqLength.textContent = '✕ 8+ chars';
        reqLength.classList.remove('met');
      }

      if (/\d/.test(val)) {
        reqNumber.textContent = '✓ numbers';
        reqNumber.classList.add('met');
      } else {
        reqNumber.textContent = '✕ numbers';
        reqNumber.classList.remove('met');
      }

      if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) {
        reqSpecial.textContent = '✓ special char';
        reqSpecial.classList.add('met');
      } else {
        reqSpecial.textContent = '✕ special char';
        reqSpecial.classList.remove('met');
      }
    });

    document.getElementById('updateBtn').addEventListener('click', async () => {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('updateBtn');

      if (!password || password.length < 8) {
        errorMsg.textContent = 'Password must be at least 8 characters.';
        return;
      }

      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match.';
        return;
      }

      btn.textContent = 'Updating...';
      btn.disabled = true;

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        errorMsg.textContent = error.message;
        btn.textContent = 'Update Password →';
        btn.disabled = false;
      } else {
        btn.textContent = '✓ Password updated!';
        errorMsg.style.color = '#00d4d4';
        errorMsg.textContent = 'Redirecting to login...';
        setTimeout(() => window.location.href = '/pages/login.html', 2000);
      }
    });
  </script>
</body>
</html>
