<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password — Noxis AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div class="auth-container">
        <a href="/index.html" class="auth-logo">noxis ai</a>
        <div class="auth-card">
            <h1>New Password</h1>
            <p class="auth-sub">Enter your new password below.</p>
            <div class="auth-form">
                <div class="input-group">
                    <label>New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Min 8 characters" />
                        <button type="button" class="eye-toggle" id="eyeToggle">
                            <i data-lucide="eye" style="width:16px;height:16px;"></i>
                        </button>
                    </div>
                    <div class="password-requirements">
                        <span class="req" id="reqLength">8+ chars</span>
                        <span class="req" id="reqNumber">number</span>
                        <span class="req" id="reqSpecial">special char</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" />
                        <button type="button" class="eye-toggle" id="eyeToggle2">
                            <i data-lucide="eye" style="width:16px;height:16px;"></i>
                        </button>
                    </div>
                </div>
                <p class="auth-error" id="errorMsg"></p>
                <button class="auth-btn" id="updateBtn">Update Password</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="../assets/js/config.js"></script>
    <script>
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true, autoRefreshToken: true }
        });

        lucide.createIcons();

        // Eye toggles
        const eyeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        const eyeOffIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

        document.getElementById('eyeToggle').innerHTML = eyeIcon;
        document.getElementById('eyeToggle2').innerHTML = eyeIcon;

        document.getElementById('eyeToggle').addEventListener('click', () => {
            const input = document.getElementById('password');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            document.getElementById('eyeToggle').innerHTML = isPassword ? eyeOffIcon : eyeIcon;
        });

        document.getElementById('eyeToggle2').addEventListener('click', () => {
            const input = document.getElementById('confirmPassword');
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            document.getElementById('eyeToggle2').innerHTML = isPassword ? eyeOffIcon : eyeIcon;
        });

        // Password requirements
        document.getElementById('password').addEventListener('input', () => {
            const val = document.getElementById('password').value;
            const reqLength = document.getElementById('reqLength');
            const reqNumber = document.getElementById('reqNumber');
            const reqSpecial = document.getElementById('reqSpecial');

            reqLength.textContent = '8+ chars';
            reqLength.className = val.length >= 8 ? 'req met' : 'req';
            reqNumber.className = /\d/.test(val) ? 'req met' : 'req';
            reqSpecial.className = /[!@#$%^&*(),.?":{}|<>]/.test(val) ? 'req met' : 'req';
        });

        document.getElementById('updateBtn').addEventListener('click', async () => {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('updateBtn');

            if (!password || password.length < 8) {
                errorMsg.textContent = 'Password must be at least 8 characters.';
                return;
            }

            if (password !== confirm) {
                errorMsg.textContent = 'Passwords do not match.';
                return;
            }

            btn.textContent = 'Updating...';
            btn.disabled = true;

            const { error } = await client.auth.updateUser({ password });

            if (error) {
                errorMsg.textContent = error.message;
                btn.textContent = 'Update Password';
                btn.disabled = false;
            } else {
                btn.textContent = '✓ Password updated!';
                errorMsg.style.color = '#00d4d4';
                errorMsg.textContent = 'Redirecting to login...';
                setTimeout(() => window.location.href = '/pages/login.html', 2000);
            }
        });
    </script>
</body>
</html>
