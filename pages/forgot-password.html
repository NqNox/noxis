<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Noxis AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/auth.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <div class="auth-container">
        <a href="/index.html" class="auth-logo">noxis ai</a>
        <div class="auth-card">
            <a href="/pages/login.html" class="back-btn">
                <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
                Back to Login
            </a>
            <h1>Reset Password</h1>
            <p class="auth-sub">Enter your email and we'll send you a reset link.</p>
            <div class="auth-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="your@email.com" />
                </div>
                <p class="auth-error" id="errorMsg"></p>
                <button class="auth-btn" id="resetBtn">Send Reset Link</button>
            </div>
            <p class="auth-switch">
                Remember your password? <a href="/pages/login.html">Log in</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script>
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true, autoRefreshToken: true }
        });

        lucide.createIcons();

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('resetBtn');

            if (!email) {
                errorMsg.textContent = 'Please enter your email.';
                document.getElementById('email').classList.add('input-error');
                return;
            }

            btn.textContent = 'Sending...';
            btn.disabled = true;

            const { error } = await client.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://noxis-ai.app/pages/reset-password.html'
            });

            if (error) {
                errorMsg.textContent = error.message;
                btn.textContent = 'Send Reset Link';
                btn.disabled = false;
            } else {
                btn.textContent = '✓ Email sent!';
                errorMsg.style.color = '#00d4d4';
                errorMsg.textContent = 'Check your inbox for the reset link.';
            }
        });
    </script>
</body>
</html>
