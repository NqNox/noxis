<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noxis AI Journal — Forgot Password</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>

  <div class="login-page">
    <div class="login-glow-left"></div>
    <div class="login-glow-right"></div>

    <a href="../index.html" class="login-logo">
      <svg viewBox="0 0 100 100" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;flex-shrink:0;"><defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect x="50" y="11" width="50" height="50" rx="8" ry="8" transform="rotate(45 50 50)" stroke="#00D4D4" stroke-width="8" fill="none" filter="url(#glow)"/></svg>
      <span>noxis ai</span>
    </a>

    <div class="login-card">
      <div class="login-card-glow"></div>
      <div class="login-card-top">
        <a href="../index.html" class="login-logo login-logo-compact">
          <svg viewBox="0 0 100 100" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;flex-shrink:0;"><defs><filter id="glow-compact" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect x="50" y="11" width="50" height="50" rx="8" ry="8" transform="rotate(45 50 50)" stroke="#00D4D4" stroke-width="8" fill="none" filter="url(#glow-compact)"/></svg>
          <span>noxis ai</span>
        </a>
        <a href="../index.html" class="back-home">← Back</a>
      </div>
      <h1 class="login-title">Reset your password</h1>
      <p class="login-sub">Enter your email and we'll send you a reset link.</p>

      <p class="error-msg" id="errorMsg"></p>

      <div class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <button type="button" class="login-btn" id="resetBtn">Send Reset Link →</button>
      </div>

      <p class="login-footer"><a href="login.html">← Back to login</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script>
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('resetBtn');

      if (!email) {
        errorMsg.textContent = 'Please enter your email.';
        document.getElementById('email').classList.add('input-error');
        return;
      }

      btn.textContent = 'Sending...';
      btn.disabled = true;

      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://noxis-ai.app/pages/reset-password.html'
      });

      if (error) {
        errorMsg.textContent = error.message;
        btn.textContent = 'Send Reset Link →';
        btn.disabled = false;
      } else {
        errorMsg.style.color = '#00d4d4';
        errorMsg.innerHTML = '✓ Reset link sent!<br><span style="font-size:0.9rem;opacity:0.8;">Check your inbox for the password reset link. It may take a minute to arrive.</span>';
        btn.textContent = 'Email Sent ✓';
        btn.style.opacity = '0.6';
        btn.style.cursor = 'default';
      }
    });
  </script>
</body>
</html>
