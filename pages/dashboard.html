<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxis — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">noxis ai</div>
        <div class="sidebar-divider"></div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard">
                <i data-lucide="layout-dashboard" class="nav-icon"></i>
                <span class="nav-label">Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-page="checklist">
                <i data-lucide="check-square" class="nav-icon"></i>
                <span class="nav-label">Checklist</span>
            </a>
            <a href="#" class="nav-item" data-page="journal">
                <i data-lucide="book-open" class="nav-icon"></i>
                <span class="nav-label">Journal</span>
            </a>
            <a href="#" class="nav-item" data-page="streak">
                <i data-lucide="flame" class="nav-icon"></i>
                <span class="nav-label">Streak</span>
            </a>
            <a href="#" class="nav-item" data-page="ai">
                <i data-lucide="brain" class="nav-icon"></i>
                <span class="nav-label">AI Insights</span>
            </a>
        </nav>
        <div class="sidebar-bottom">
            <a href="#" class="nav-item" data-page="settings">
                <i data-lucide="settings" class="nav-icon"></i>
                <span class="nav-label">Settings</span>
            </a>
            <div class="sidebar-user">
                <div class="user-avatar">N</div>
                <div class="user-info">
                    <span class="user-name">Noam</span>
                    <span class="user-plan">Free Plan</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="page active" id="page-dashboard">
            <!-- TOP BAR -->
            <div class="page-header">
                <h1 class="page-title">My Dashboard</h1>
                <button class="btn-log-trade">+ Log Trade</button>
            </div>

            <!-- STATS ROW -->
            <div class="dashboard-top">
                <div class="stats-card">
                    <div class="stat-item">
                        <span class="stat-name">Balance</span>
                        <span class="stat-value green">$50,000</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-name">RP&L</span>
                        <span class="stat-value">$0</span>
                    </div>
                </div>

                <div class="streak-card">
                    <div class="streak-flame">🔥</div>
                    <div class="streak-info">
                        <span class="streak-title">My Streak</span>
                        <div class="streak-days">
                            <div class="day-circle active">15<span>Mon</span></div>
                            <div class="day-circle active">16<span>Tue</span></div>
                            <div class="day-circle">17<span>Wed</span></div>
                            <div class="day-circle">18<span>Thu</span></div>
                            <div class="day-circle">19<span>Fri</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BIG CARD -->
            <div class="recent-card">
                <div class="recent-header">
                    <span class="recent-title">Recent Trades</span>
                    <a href="#" class="recent-link">View all →</a>
                </div>
                <div class="recent-empty">
                    <span>No trades logged yet.</span>
                    <button class="btn-log-trade-sm">+ Log your first trade</button>
                </div>
            </div>
        </div>
        <div class="page" id="page-checklist">
            <h1>Checklist</h1>
        </div>
        <div class="page" id="page-journal">
            <h1>Journal</h1>
        </div>
        <div class="page" id="page-streak">
            <h1>Streak</h1>
        </div>
        <div class="page" id="page-ai">
            <h1>AI Insights</h1>
        </div>
        <div class="page" id="page-settings">
            <h1>Settings</h1>
        </div>
    </main>

    <!-- BOTTOM NAV (mobile) -->
    <nav class="bottom-nav">
        <button class="bottom-nav-item active" data-page="dashboard">
            <i data-lucide="layout-dashboard" class="nav-icon"></i>
            <span>Dashboard</span>
        </button>
        <button class="bottom-nav-item" data-page="checklist">
            <i data-lucide="check-square" class="nav-icon"></i>
            <span>Checklist</span>
        </button>
        <button class="bottom-nav-item" data-page="journal">
            <i data-lucide="book-open" class="nav-icon"></i>
            <span>Journal</span>
        </button>
        <button class="bottom-nav-item" data-page="streak">
            <i data-lucide="flame" class="nav-icon"></i>
            <span>Streak</span>
        </button>
        <button class="bottom-nav-item" data-page="ai">
            <i data-lucide="brain" class="nav-icon"></i>
            <span>AI</span>
        </button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
