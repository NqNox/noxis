<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noxis AI — Reset Password</title>
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>

  <div class="login-page">
    <div class="login-glow-left"></div>
    <div class="login-glow-right"></div>

    <a href="index.html" class="login-logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 1L23 12L12 23L1 12Z" stroke="#00d4d4" stroke-width="1.5" fill="none"/><path d="M12 5L19 12L12 19L5 12Z" stroke="#00d4d4" stroke-width="1.5" fill="none"/></svg>
      <span>noxis ai</span>
    </a>

    <div class="login-card">
      <div class="login-card-glow"></div>
      <h1 class="login-title">Set new password</h1>
      <p class="login-sub">Enter your new password below.</p>

      <p class="error-msg" id="errorMsg"></p>

      <div class="login-form">
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="button" class="eye-toggle" id="eyeToggle"></button>
          </div>
          <div class="password-reqs">
            <span id="reqLength">✕ 8+ chars</span>
            <span id="reqNumber">✕ numbers</span>
            <span id="reqSpecial">✕ special char</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirm-password" placeholder="••••••••" required>
            <button type="button" class="eye-toggle" id="eyeToggle2"></button>
          </div>
        </div>

        <button type="button" class="login-btn" id="updateBtn">Update Password →</button>
      </div>

      <p class="login-footer"><a href="login.html">← Back to login</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
